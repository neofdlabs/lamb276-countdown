<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMB276 — Countdown to Launch</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --dark: #071a1a;
  --teal-deep: #0b2e2b;
  --teal: #0f6b5a;
  --teal-bright: #1abc9c;
  --teal-glow: #2eecc1;
  --white: #fff;
  --white-70: rgba(255,255,255,0.7);
  --white-40: rgba(255,255,255,0.4);
  --white-15: rgba(255,255,255,0.15);
}

html, body {
  height: 100%;
  font-family: 'Outfit', sans-serif;
  background: var(--dark);
  color: var(--white);
  overflow-x: hidden;
}

/* ===== FULL PAGE ===== */
.page {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}

/* ===== BACKGROUND ===== */
.bg-layer {
  position: absolute;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 90% 70% at 50% 75%, rgba(26,188,156,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 70% 55% at 25% 50%, rgba(15,107,90,0.35) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 80% 30%, rgba(11,46,43,0.6) 0%, transparent 50%),
    linear-gradient(180deg, #0a2420 0%, #0d3d34 35%, #0b2e2b 65%, #071a1a 100%);
}

.teal-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--teal-bright), var(--teal-glow), var(--teal-bright));
  z-index: 10;
}

/* ===== ORBITAL LINES ===== */
.orbitals {
  position: absolute;
  top: 55%; left: 50%;
  transform: translate(-50%, -45%);
  width: 900px; height: 900px;
  z-index: 1;
  pointer-events: none;
}

.orbital-ring {
  position: absolute;
  border-radius: 50%;
  top: 50%; left: 50%;
}

.orbital-ring:nth-child(1) {
  width: 480px; height: 280px;
  border: 1px dotted var(--white-15);
  transform: translate(-50%,-50%) rotate(-15deg);
  animation: orbit1 80s linear infinite;
}
.orbital-ring:nth-child(2) {
  width: 680px; height: 380px;
  border: 1px solid rgba(255,255,255,0.08);
  transform: translate(-50%,-50%) rotate(10deg);
  animation: orbit2 120s linear infinite;
}
.orbital-ring:nth-child(3) {
  width: 840px; height: 480px;
  border: 1px dashed rgba(255,255,255,0.06);
  transform: translate(-50%,-50%) rotate(-5deg);
  animation: orbit3 150s linear infinite;
}

@keyframes orbit1 { to { transform: translate(-50%,-50%) rotate(345deg); } }
@keyframes orbit2 { to { transform: translate(-50%,-50%) rotate(370deg); } }
@keyframes orbit3 { to { transform: translate(-50%,-50%) rotate(355deg); } }

/* Sparkles */
.sparkle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--white);
  border-radius: 50%;
  z-index: 2;
  animation: sparkle-pulse 3s ease-in-out infinite;
  box-shadow: 0 0 8px 2px rgba(46,236,193,0.5);
}
.sparkle:nth-child(1) { top: 15%; right: 14%; animation-delay: 0s; }
.sparkle:nth-child(2) { top: 42%; right: 7%;  animation-delay: 1.2s; width:3px; height:3px; }
.sparkle:nth-child(3) { top: 28%; left: 11%;  animation-delay: 0.6s; width:2px; height:2px; }
.sparkle:nth-child(4) { top: 62%; left: 18%;  animation-delay: 2s; }
.sparkle:nth-child(5) { top: 75%; right: 22%; animation-delay: 0.3s; width:3px; height:3px; }

@keyframes sparkle-pulse {
  0%,100% { opacity:0.2; transform:scale(1); }
  50%     { opacity:1;   transform:scale(2); }
}

/* ===== COUNTDOWN ===== */
.countdown-section {
  position: relative;
  z-index: 5;
  width: 100%;
  display: flex;
  justify-content: center;
  background: rgba(7,26,26,0.65);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--white-15);
}

.countdown {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 28px 0 24px;
}

.countdown-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 80px;
}

.countdown-num {
  font-family: 'Space Mono', monospace;
  font-size: 44px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 2px;
  color: var(--white);
}

.countdown-num.flip {
  animation: num-flip 0.45s ease-in-out;
}

@keyframes num-flip {
  0%   { transform: perspective(200px) rotateX(0); opacity:1; }
  35%  { transform: perspective(200px) rotateX(-90deg); opacity:0; }
  65%  { transform: perspective(200px) rotateX(90deg); opacity:0; }
  100% { transform: perspective(200px) rotateX(0); opacity:1; }
}

.countdown-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--white-40);
  margin-top: 6px;
}

.countdown-sep {
  font-family: 'Space Mono', monospace;
  font-size: 34px;
  font-weight: 700;
  color: var(--white-40);
  padding-bottom: 18px;
  animation: blink 1s step-end infinite;
}

@keyframes blink { 50% { opacity:0.15; } }

/* ===== HERO ===== */
.hero {
  position: relative;
  z-index: 3;
  text-align: center;
  padding: 70px 24px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hero-sub {
  font-size: 16px;
  font-weight: 300;
  letter-spacing: 4px;
  color: var(--white-70);
  margin-bottom: 24px;
  animation: fadeUp 0.8s ease-out both;
}

.hero-title {
  font-size: clamp(32px, 5.5vw, 66px);
  font-weight: 300;
  line-height: 1.25;
  max-width: 860px;
  animation: fadeUp 0.8s 0.15s ease-out both;
}

.hero-title strong {
  font-weight: 900;
  letter-spacing: 3px;
}

.hero-title .fjord {
  display: inline-block;
  font-weight: 800;
  letter-spacing: 8px;
  font-size: 1.05em;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ===== COIN ===== */
.coin-wrap {
  position: relative;
  z-index: 2;
  margin-top: 20px;
  display: flex;
  justify-content: center;
  animation: fadeUp 1s 0.35s ease-out both;
}

.coin {
  width: 300px; height: 300px;
  border-radius: 50%;
  position: relative;
  background: radial-gradient(ellipse at 38% 35%,
    rgba(46,236,193,0.45) 0%,
    rgba(26,188,156,0.25) 20%,
    rgba(15,107,90,0.55) 45%,
    rgba(11,46,43,0.85) 75%,
    var(--dark) 100%
  );
  box-shadow:
    0 0 80px rgba(26,188,156,0.25),
    0 0 160px rgba(26,188,156,0.1),
    inset 0 -20px 40px rgba(0,0,0,0.4),
    inset 0 10px 30px rgba(46,236,193,0.1);
  animation: coin-float 6s ease-in-out infinite;
  display: flex;
  align-items: center;
  justify-content: center;
}

.coin::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  border: 1.5px solid rgba(46,236,193,0.15);
}

/* Lamb / Key SVG inside coin */
.coin svg {
  width: 130px; height: 130px;
  opacity: 0.8;
  filter: drop-shadow(0 0 16px rgba(46,236,193,0.25));
}

.coin-glow {
  position: absolute;
  bottom: -20px;
  width: 260px; height: 30px;
  background: radial-gradient(ellipse, rgba(26,188,156,0.2) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(8px);
}

@keyframes coin-float {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-14px); }
}

/* ===== CTA ===== */
.cta {
  position: relative;
  z-index: 5;
  padding: 40px 24px 60px;
  animation: fadeUp 1s 0.5s ease-out both;
}

.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 44px;
  border: 1px solid var(--teal-bright);
  border-radius: 60px;
  background: rgba(26,188,156,0.08);
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1.5px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.35s ease;
  backdrop-filter: blur(4px);
}

.cta-btn:hover {
  background: rgba(26,188,156,0.2);
  box-shadow: 0 0 40px rgba(26,188,156,0.25);
  transform: translateY(-2px);
}

.cta-btn svg {
  width: 16px; height: 16px;
  stroke: var(--teal-glow);
  fill: none; stroke-width: 2.5;
  transition: transform 0.3s;
}
.cta-btn:hover svg { transform: translateX(4px); }

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .countdown-num   { font-size: 28px; }
  .countdown-block { min-width: 56px; }
  .countdown-sep   { font-size: 22px; }
  .hero    { padding: 50px 20px 20px; }
  .coin    { width: 220px; height: 220px; }
  .coin svg { width: 90px; height: 90px; }
}
</style>
</head>
<body>

<div class="page">
  <div class="bg-layer"></div>
  <div class="teal-bar"></div>

  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>

  <div class="orbitals">
    <div class="orbital-ring"></div>
    <div class="orbital-ring"></div>
    <div class="orbital-ring"></div>
  </div>

  <!-- Countdown -->
  <div class="countdown-section">
    <div class="countdown">
      <div class="countdown-block">
        <div class="countdown-num" id="days">00</div>
        <div class="countdown-label">Days</div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-block">
        <div class="countdown-num" id="hours">00</div>
        <div class="countdown-label">Hours</div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-block">
        <div class="countdown-num" id="minutes">00</div>
        <div class="countdown-label">Minutes</div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-block">
        <div class="countdown-num" id="seconds">00</div>
        <div class="countdown-label">Seconds</div>
      </div>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <p class="hero-sub">Early Access to Intelligence Driven Finance</p>
    <h1 class="hero-title">
      Join <strong>LAMB276</strong> At Its Origin<br>
      Through The <span class="fjord">FJORD</span>
    </h1>
  </div>

  <!-- Coin -->
  <div class="coin-wrap">
    <div class="coin">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <!-- Stylized key / lamb symbol -->
        <circle cx="60" cy="42" r="22" stroke="rgba(46,236,193,0.6)" stroke-width="2" fill="none"/>
        <circle cx="54" cy="38" r="5" stroke="rgba(46,236,193,0.4)" stroke-width="1.5" fill="none"/>
        <circle cx="66" cy="38" r="5" stroke="rgba(46,236,193,0.4)" stroke-width="1.5" fill="none"/>
        <line x1="60" y1="64" x2="60" y2="100" stroke="rgba(46,236,193,0.6)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="60" y1="78" x2="72" y2="78" stroke="rgba(46,236,193,0.5)" stroke-width="2" stroke-linecap="round"/>
        <line x1="60" y1="88" x2="70" y2="88" stroke="rgba(46,236,193,0.5)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="coin-glow"></div>
  </div>

  <!-- CTA -->
  <div class="cta">
    <a href="#" class="cta-btn">
      Learn More
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</div>

<script>
// ========== COUNTDOWN TO MARCH 25, 2026 00:00 UTC ==========
const TARGET = new Date('2026-03-25T00:00:00Z').getTime();

const els = {
  d: document.getElementById('days'),
  h: document.getElementById('hours'),
  m: document.getElementById('minutes'),
  s: document.getElementById('seconds')
};

let prev = { d:'', h:'', m:'', s:'' };

function pad(n) { return String(n).padStart(2,'0'); }

function flip(el) {
  el.classList.remove('flip');
  void el.offsetWidth;
  el.classList.add('flip');
}

function tick() {
  const diff = Math.max(0, TARGET - Date.now());
  const vals = {
    d: pad(Math.floor(diff / 86400000)),
    h: pad(Math.floor((diff % 86400000) / 3600000)),
    m: pad(Math.floor((diff % 3600000) / 60000)),
    s: pad(Math.floor((diff % 60000) / 1000))
  };

  for (const k of ['d','h','m','s']) {
    if (vals[k] !== prev[k]) {
      els[k].textContent = vals[k];
      flip(els[k]);
      prev[k] = vals[k];
    }
  }

  if (diff <= 0) {
    clearInterval(timer);
    document.querySelector('.hero-sub').textContent = 'LAMB276 IS NOW LIVE';
  }
}

tick();
const timer = setInterval(tick, 200);
</script>

</body>
</html>
