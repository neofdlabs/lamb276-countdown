<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMB276 Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body {
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Outfit', sans-serif;
}

.countdown {
  display: flex;
  align-items: center;
  gap: 8px;
}

.countdown-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 72px;
}

.countdown-num {
  font-family: 'Space Mono', monospace;
  font-size: 42px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 2px;
  color: #ffffff;
}

.countdown-num.flip {
  animation: num-flip 0.45s ease-in-out;
}

@keyframes num-flip {
  0%   { transform: perspective(200px) rotateX(0); opacity:1; }
  35%  { transform: perspective(200px) rotateX(-90deg); opacity:0; }
  65%  { transform: perspective(200px) rotateX(90deg); opacity:0; }
  100% { transform: perspective(200px) rotateX(0); opacity:1; }
}

.countdown-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-top: 6px;
}

.countdown-sep {
  font-family: 'Space Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  color: rgba(255,255,255,0.4);
  padding-bottom: 18px;
  animation: blink 1s step-end infinite;
}

@keyframes blink { 50% { opacity:0.15; } }

@media (max-width: 480px) {
  .countdown-num   { font-size: 28px; }
  .countdown-block { min-width: 50px; }
  .countdown-sep   { font-size: 22px; }
}
</style>
</head>
<body>

<div class="countdown">
  <div class="countdown-block">
    <div class="countdown-num" id="days">00</div>
    <div class="countdown-label">Days</div>
  </div>
  <div class="countdown-sep">:</div>
  <div class="countdown-block">
    <div class="countdown-num" id="hours">00</div>
    <div class="countdown-label">Hours</div>
  </div>
  <div class="countdown-sep">:</div>
  <div class="countdown-block">
    <div class="countdown-num" id="minutes">00</div>
    <div class="countdown-label">Minutes</div>
  </div>
  <div class="countdown-sep">:</div>
  <div class="countdown-block">
    <div class="countdown-num" id="seconds">00</div>
    <div class="countdown-label">Seconds</div>
  </div>
</div>

<script>
const TARGET = new Date('2026-03-25T13:00:00Z').getTime();
const els = {
  d: document.getElementById('days'),
  h: document.getElementById('hours'),
  m: document.getElementById('minutes'),
  s: document.getElementById('seconds')
};
let prev = { d:'', h:'', m:'', s:'' };

function pad(n) { return String(n).padStart(2,'0'); }
function flip(el) { el.classList.remove('flip'); void el.offsetWidth; el.classList.add('flip'); }

function tick() {
  const diff = Math.max(0, TARGET - Date.now());
  const vals = {
    d: pad(Math.floor(diff / 86400000)),
    h: pad(Math.floor((diff % 86400000) / 3600000)),
    m: pad(Math.floor((diff % 3600000) / 60000)),
    s: pad(Math.floor((diff % 60000) / 1000))
  };
  for (const k of ['d','h','m','s']) {
    if (vals[k] !== prev[k]) { els[k].textContent = vals[k]; flip(els[k]); prev[k] = vals[k]; }
  }
  if (diff <= 0) clearInterval(timer);
}

tick();
const timer = setInterval(tick, 200);
</script>

</body>
</html>
